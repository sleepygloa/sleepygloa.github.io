<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD 플레이어</title>
    <link rel="stylesheet" type="text/css" href="./css/reset.css" />
    <link rel="stylesheet" type="text/css" href="./css/motion.css" />
    <style>
    </style>
    <script>
var prev_button, next_button;
var contentWrap;
var disk_inner;
var pageNum = 0;
var totalNum = 0;
var album;
var pointBtnAll;
var bgArray = new Array();
bgArray[0] = ["#0272a4","#f6a564"];
bgArray[1] = ["#b6bfc8","#36595b"];
bgArray[2] = ["#e58e82","#6f569f"];

window.onload = function(){
    prev_button = document.querySelectorAll("button")[0];
    next_button = document.querySelectorAll("button")[1];
    
    contentWrap = document.querySelector(".contentWrap");
    disk_inner = document.querySelectorAll(".disk_inner");
    album = document.querySelectorAll(".album");
    pointBtnAll = document.querySelectorAll(".pointWrap li");
    totalNum = album.length;
    // alert(totalNum)

    prev_button.addEventListener("click", function(){
        if(pageNum > 0){
            pageNum --;
        }else{
            pageNum = totalNum -1;
        }
        pageChangeFunc();
    })

    next_button.addEventListener("click", function(){
        if(pageNum < totalNum-1){
            pageNum ++;
        }else{
            pageNum = 0;
        }
        pageChangeFunc();
    })

    for( var i = 0; i < pointBtnAll.length; i++ ){
        (function(idx) {
            pointBtnAll[idx].onclick = function() {
                // alert(idx);
                pageNum = idx;
                pageChangeFunc();
            }
        })(i);
    }

    //최초실행
    // pageNum = 2;
    pageChangeFunc();
}

//여기서 모든 것을 한다.
function pageChangeFunc(){

    // console.log(bgArray[pageNum][1])
    contentWrap.style.background = "linear-gradient(120deg,"+ bgArray[pageNum][0] +", "+ bgArray[pageNum][1] + ")";

    for(var i=0; i<totalNum; i++){
        if(pageNum == i){
            //현재 컨텐츠(페이지)
            album[i].classList.add("active");
            pointBtnAll[i].classList.add("active");
        }else{
            album[i].classList.remove("active");
            pointBtnAll[i].classList.remove("active");
        }
    }
    
    // album[pageNum].classList.add("active");

    disk_inner[pageNum].style.background = bgArray[pageNum][0];
}
    </script>
    </head>
    <body>
      <article class="contentWrap">

        <section class="album active">
          <div class="disk">
            <div class="disk_inner"></div>
          </div>
          <a href="https://www.youtube.com/watch?v=nM0xDI5R50E" target="blank" class="coverImg">
            <img src="./image/iu_0.jpg" alt="">
          </a>
        </section>
    
        <section class="album">
          <div class="disk">
            <div class="disk_inner"></div>
          </div>
          <a href="https://www.youtube.com/watch?v=Ub6IyAOTwr8"  target="blank" class="coverImg">
            <img src="./image/iu_1.jpg" alt="">
          </a>
        </section>
    
        <section class="album">
          <div class="disk">
            <div class="disk_inner"></div>
          </div>
          <a href="https://www.youtube.com/watch?v=D1PvIWdJ8xo"  target="blank" class="coverImg">
            <img src="./image/iu_2.jpg" alt="">
          </a>
        </section>
      
      </article>

      <div class="buttonWrap">
        <button type="button">PREV</button>
        <ul class="pointWrap">
          <li></li>
          <li></li>
          <li></li>
        </ul>
        <button type="button">NEXT</button>
      </div>
    </body>
</html>
